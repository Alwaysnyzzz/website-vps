<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Struk - DzzXNzz</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/style-extra.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes successPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shineBar{0%{background-position:0%}100%{background-position:200%}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinR{to{transform:rotate(-360deg)}}
body{font-family:'Nunito',sans-serif;}
.navbar #menu-toggle{display:none;}
.main-content{padding:90px 20px 50px;max-width:460px;margin:0 auto;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.confetti-piece{position:absolute;top:-20px;border-radius:2px;animation:confettiFall linear forwards;}
.struk-card{background:rgba(13,15,25,0.92);backdrop-filter:blur(18px);border-radius:26px;border:1px solid rgba(0,255,136,0.3);box-shadow:0 0 40px rgba(0,255,136,0.12),0 25px 60px rgba(0,0,0,0.7);overflow:hidden;animation:fadeInUp 0.7s ease;}
.struk-bar{height:4px;background:linear-gradient(90deg,#00ff88,#00e5ff,#bf00ff,#ffe000,#00ff88);background-size:200% 100%;animation:shineBar 3s linear infinite;}
.struk-body{padding:28px 24px;}
.success-icon-wrap{text-align:center;margin-bottom:20px;}
.success-icon{width:80px;height:80px;border-radius:50%;background:rgba(0,255,136,0.12);border:3px solid #00ff88;display:flex;align-items:center;justify-content:center;font-size:34px;color:#00ff88;box-shadow:0 0 35px rgba(0,255,136,0.35);margin:0 auto 14px;animation:successPop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}
.success-title{font-family:'Righteous',cursive;font-size:24px;color:#00ff88;filter:drop-shadow(0 0 10px rgba(0,255,136,0.5));margin-bottom:4px;}
.success-sub{font-size:13px;color:rgba(255,255,255,0.45);font-weight:700;}
.produk-box{background:rgba(191,0,255,0.07);border:1px solid rgba(191,0,255,0.25);border-radius:14px;padding:14px 18px;margin:18px 0;display:flex;align-items:center;gap:14px;}
.produk-icon{width:42px;height:42px;border-radius:12px;background:rgba(191,0,255,0.15);border:1px solid rgba(191,0,255,0.3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.produk-label{font-size:11px;color:rgba(255,255,255,0.35);font-weight:800;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px;}
.produk-name{font-size:15px;font-weight:900;color:#fff;}
.produk-detail{font-size:12px;color:rgba(191,0,255,0.8);font-weight:700;margin-top:2px;}
.struk-divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
.struk-divider::before,.struk-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);}
.struk-divider span{font-size:11px;color:rgba(255,255,255,0.25);font-weight:800;letter-spacing:1px;white-space:nowrap;}
.detail-list{display:flex;flex-direction:column;gap:10px;margin-bottom:22px;}
.detail-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 16px;}
.detail-row-label{display:flex;align-items:center;gap:10px;}
.detail-row-label i{font-size:14px;width:18px;text-align:center;color:rgba(255,255,255,0.35);}
.detail-row-label span{font-size:13px;color:rgba(255,255,255,0.45);font-weight:700;}
.detail-row-value{font-size:13px;color:#fff;font-weight:900;text-align:right;max-width:55%;word-break:break-all;font-family:'Share Tech Mono',monospace;}
.detail-row-value.green{color:#00ff88;font-family:'Nunito',sans-serif;}
.detail-row-value.cyan{color:#00e5ff;font-family:'Nunito',sans-serif;}
.detail-row-value.normal{font-family:'Nunito',sans-serif;}
.struk-actions{display:flex;gap:12px;}
.struk-btn{flex:1;padding:14px 0;border-radius:40px;font-weight:900;font-size:14px;border:1.5px solid;background:transparent;cursor:pointer;transition:0.25s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Nunito',sans-serif;text-decoration:none;}
.struk-btn-home{border-color:#00e5ff;color:#00e5ff;}
.struk-btn-share{border-color:#00ff88;color:#00ff88;}
.struk-timestamp{text-align:center;font-size:11px;color:rgba(255,255,255,0.2);font-weight:700;margin-top:18px;font-family:'Share Tech Mono',monospace;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="confetti-wrap" id="confettiWrap"></div>
<nav class="navbar">
  <div class="nav-left"></div>
  <div class="nav-right">
    <a href="/isisaldo" class="coins-nav">🪙 <span id="coinCount">0</span></a>
    <div class="user-avatar"><span class="nav-initial" id="navInitial">?</span></div>
  </div>
</nav>
<main class="main-content">
  <div class="struk-card" id="strukCard">
    <div class="struk-bar"></div>
    <div class="struk-body">
      <div class="success-icon-wrap">
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <div class="success-title">Pembayaran Berhasil!</div>
        <div class="success-sub">Transaksi Anda Telah Di Proses</div>
      </div>
      <div class="produk-box">
        <div class="produk-icon">💰</div>
        <div>
          <div class="produk-label">Produk</div>
          <div class="produk-name" id="produkNama">Isi Saldo</div>
          <div class="produk-detail" id="produkDetail">-</div>
        </div>
      </div>
      <div class="struk-divider"><span>Detail Transaksi</span></div>
      <div class="detail-list">
        <div class="detail-row">
          <div class="detail-row-label"><i class="fas fa-hashtag"></i><span>Order ID</span></div>
          <div class="detail-row-value" id="detailOrderId">-</div>
        </div>
        <div class="detail-row">
          <div class="detail-row-label"><i class="fas fa-coins"></i><span>Nominal</span></div>
          <div class="detail-row-value cyan" id="detailAmount">-</div>
        </div>
        <div class="detail-row">
          <div class="detail-row-label"><i class="fas fa-wallet"></i><span>Coins Masuk</span></div>
          <div class="detail-row-value cyan" id="detailCoins">-</div>
        </div>
        <div class="detail-row">
          <div class="detail-row-label"><i class="fas fa-credit-card"></i><span>Metode</span></div>
          <div class="detail-row-value normal">QRIS</div>
        </div>
        <div class="detail-row">
          <div class="detail-row-label"><i class="fas fa-calendar"></i><span>Tanggal</span></div>
          <div class="detail-row-value normal" id="detailTanggal">-</div>
        </div>
        <div class="detail-row">
          <div class="detail-row-label"><i class="fas fa-clock"></i><span>Waktu</span></div>
          <div class="detail-row-value normal" id="detailWaktu">-</div>
        </div>
        <div class="detail-row">
          <div class="detail-row-label"><i class="fas fa-check-circle"></i><span>Status</span></div>
          <div class="detail-row-value green">✔ Berhasil</div>
        </div>
      </div>
      <div class="struk-actions">
        <a href="/" class="struk-btn struk-btn-home"><i class="fas fa-home"></i> Home</a>
        <button class="struk-btn struk-btn-share" id="shareBtn"><i class="fas fa-share-alt"></i> Bagikan</button>
      </div>
      <div class="struk-timestamp" id="strukTimestamp"></div>
    </div>
  </div>
</main>
<script src="/config.js"></script>
<script src="/auth.js"></script>
<script src="/script.js"></script>
<script>
(function(){
  const params  = new URLSearchParams(window.location.search);
  const orderId = params.get('order_id');
  if(!orderId){ window.location.href='/'; return; }

  function launchConfetti(){
    const colors=['#00e5ff','#00ff88','#ff4de4','#ffe000','#bf00ff','#ff7b00'];
    const wrap=document.getElementById('confettiWrap');
    for(let i=0;i<60;i++){
      const p=document.createElement('div');
      p.className='confetti-piece';
      p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s;`;
      wrap.appendChild(p);
    }
    setTimeout(()=>{wrap.innerHTML='';},6000);
  }

  function showStruk(data){
    const ts   = data.paid_at||data.created_at||new Date().toISOString();
    const date = new Date(ts);
    const amt  = Number(data.amount)||0;
    document.getElementById('produkNama').textContent   = 'Isi Saldo';
    document.getElementById('produkDetail').textContent = 'Top up Rp '+amt.toLocaleString('id-ID')+' → +'+amt.toLocaleString('id-ID')+' Coins';
    document.getElementById('detailOrderId').textContent = data.order_id||orderId;
    document.getElementById('detailAmount').textContent  = 'Rp '+amt.toLocaleString('id-ID');
    document.getElementById('detailCoins').textContent   = '+'+amt.toLocaleString('id-ID')+' 🪙';
    document.getElementById('detailTanggal').textContent = date.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
    document.getElementById('detailWaktu').textContent   = date.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('strukTimestamp').textContent= 'Diproses pada '+date.toLocaleString('id-ID');
    localStorage.removeItem('nyzz-profile');
    if(typeof Auth!=='undefined'&&Auth.isLoggedIn()){
      Auth.getProfile(true).then(p=>{
        if(p){ const el=document.getElementById('coinCount'); if(el) el.textContent=Number(p.coins).toLocaleString('id-ID'); }
      });
    }
    launchConfetti();
  }

  // Ambil data dari Supabase langsung
  fetch(CONFIG.SUPABASE_URL+'/rest/v1/transactions?order_id=eq.'+orderId+'&select=order_id,amount,status,created_at,paid_at',{
    headers:{'apikey':CONFIG.SUPABASE_ANON,'Authorization':'Bearer '+CONFIG.SUPABASE_ANON}
  })
  .then(r=>r.json())
  .then(rows=>{
    showStruk(rows&&rows.length?rows[0]:{order_id:orderId,amount:0,created_at:new Date().toISOString()});
  })
  .catch(()=>{
    showStruk({order_id:orderId,amount:0,created_at:new Date().toISOString()});
  });

  document.getElementById('shareBtn')?.addEventListener('click',function(){
    const txt='✅ Top up berhasil!\nOrder ID: '+orderId+'\nPlatform: DzzXNzz Store';
    if(navigator.share){ navigator.share({title:'Top Up Berhasil - DzzXNzz',text:txt,url:window.location.href}); }
    else{ navigator.clipboard.writeText(txt); this.textContent='✓ Disalin!'; setTimeout(()=>{this.innerHTML='<i class="fas fa-share-alt"></i> Bagikan';},2000); }
  });
})();
</script>
</body>
</html>
