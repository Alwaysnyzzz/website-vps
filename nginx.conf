server {
    listen 80;
    server_name _; # Ganti dengan domain kamu jika ada

    root /var/www/html;
    index index.html;

    # ─── API: proxy ke Node.js backend ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # /isisaldo → form isi saldo
    location = /isisaldo {
        try_files /isisaldo.html =404;
    }

    # /isisaldo/ORDER_ID → halaman bayar QRIS
    location ~ ^/isisaldo/(.+)$ {
        try_files /isisaldo-pay.html =404;
    }

    location = /struk    { try_files /struk.html =404; }
    location = /login    { try_files /login.html =404; }
    location = /register { try_files /register.html =404; }
    location = /product  { try_files /product.html =404; }
    location = /contact  { try_files /contact.html =404; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
